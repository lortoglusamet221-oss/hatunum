<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bizim Hikayemiz 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow-x: hidden;
}

h1 {
  margin-top: 20px;
  color: white;
}

#startBtn {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 15px;
}

.game {
  display: grid;
  grid-template-columns: repeat(4, 110px);
  gap: 12px;
  justify-content: center;
  margin-top: 30px;
}

.card {
  width: 110px;
  height: 110px;
  border-radius: 15px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: 0.5s;
}

.card.flip {
  transform: rotateY(180deg);
}

.card.matched {
  pointer-events: none;
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
}

.front {
  background: pink;
}

.back {
  transform: rotateY(180deg);
}

.back img {
  width: 100%;
  height: 100%;
  border-radius: 15px;
}

#message {
  display: none;
  margin-top: 30px;
  font-size: 22px;
  color: white;
}

.heart {
  position: fixed;
  bottom: -10px;
  animation: rise 5s linear infinite;
}

@keyframes rise {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>💖 Bizim Hikayemiz 💖</h1>

<button id="startBtn">Oyunu Başlat ❤️</button>

<audio id="music" loop>
  <source src="https://www.image2url.com/r2/default/audio/1776880647740-3e83b99e-5124-4ab8-93a9-f2a121375e5b.mp3">
</audio>

<div class="game" id="game"></div>

<div id="message">
  💖 Seni Çok Seviyorum 💖<br>
  Afferin benim akıllı karıma ❤️
</div>

<script>
const images = [
  "https://i.ibb.co/LDZFvf70/1.jpg","https://i.ibb.co/s9d3qJQh/2.jpg","https://i.ibb.co/XrmgTVQq/3.jpg","https://i.ibb.co/ZpWdmsPZ/4.jpg","https://i.ibb.co/Y7LzrYxF/5.jpg","https://i.ibb.co/bMx5pmdy/6.jpg",
  "https://i.ibb.co/LDZFvf70/1.jpg","https://i.ibb.co/s9d3qJQh/2.jpg","https://i.ibb.co/XrmgTVQq/3.jpg","https://i.ibb.co/ZpWdmsPZ/4.jpg","https://i.ibb.co/Y7LzrYxF/5.jpg","https://i.ibb.co/bMx5pmdy/6.jpg"
];

let shuffled = images.sort(() => 0.5 - Math.random());

const game = document.getElementById("game");
const music = document.getElementById("music");

let first = null;
let second = null;
let lock = false;
let matched = 0;

// OYUN OLUŞTUR
shuffled.forEach(src => {
  const card = document.createElement("div");
  card.classList.add("card");
  card.dataset.id = src;

  card.innerHTML = `
    <div class="front"></div>
    <div class="back">
      <img src="${src}">
    </div>
  `;

  game.appendChild(card);

  card.addEventListener("click", () => {
    if (lock || card.classList.contains("flip")) return;
    if (card === first) return;

    card.classList.add("flip");

    if (!first) {
      first = card;
    } else {
      second = card;
      lock = true;

      if (first.dataset.id === second.dataset.id) {
        // EŞLEŞTİ
        first.classList.add("matched");
        second.classList.add("matched");

        matched += 2;
        reset();

        // OYUN BİTTİ
        if (matched === images.length) {
          document.getElementById("message").style.display = "block";
          startHearts();
        }

      } else {
        // GERİ KAPAT
        setTimeout(() => {
          first.classList.remove("flip");
          second.classList.remove("flip");
          reset();
        }, 800);
      }
    }
  });
});

function reset() {
  first = null;
  second = null;
  lock = false;
}

// ❤️ kalpler
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 250);
}

// 🎵 müzik başlat (browser fix)
document.getElementById("startBtn").addEventListener("click", () => {
  music.play();
  document.getElementById("startBtn").style.display = "none";
});
</script>

</body>
</html>
